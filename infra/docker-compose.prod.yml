# Production override for the DO Droplet deploy.
# Caddy on the host listens on 80/443 and reverse-proxies to localhost:8000,
# so the frontend container only binds the loopback interface here.
# Apply with: docker compose -f docker-compose.yml -f infra/docker-compose.prod.yml up -d

services:
  frontend:
    ports:
      - "127.0.0.1:8000:80"

  backend:
    ports:
      - "127.0.0.1:8080:8080"

  llm:
    ports:
      - "127.0.0.1:5001:5001"

  admin:
    ports:
      - "127.0.0.1:8501:8501"
