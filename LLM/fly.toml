app = "a2s-llm"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "5001"
  FLASK_ENV = "production"

[http_service]
  internal_port = 5001
  force_https = false
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 10

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "get"
    path = "/health"
    protocol = "http"
    timeout = "10s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
