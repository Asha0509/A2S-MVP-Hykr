app = "a2s-backend"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  SERVER_PORT = "8080"
  DB_DRIVER = "org.postgresql.Driver"
  DB_DIALECT = "org.hibernate.dialect.PostgreSQLDialect"
  JAVA_TOOL_OPTIONS = "-XX:MaxRAMPercentage=75 -XX:+UseSerialGC -Xss512k"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "get"
    path = "/api/health"
    protocol = "http"
    timeout = "10s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
