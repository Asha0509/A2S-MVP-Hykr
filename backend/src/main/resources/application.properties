spring.application.name=a2s-backend
server.port=8080

# Database Configuration — Neon PostgreSQL (production) or H2 (local dev)
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# HikariCP — keep warm connections ready, avoid cold-start latency
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.keepalive-time=60000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:}
# PostgreSQL LOB handling
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# Enable non-contextual LOB creation to avoid auto-commit mode issues
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=false
# Streaming LOB handling
spring.jpa.properties.hibernate.use_sql_comments=true

# H2 Console (local dev only)
spring.h2.console.enabled=${H2_CONSOLE:false}

# Security
jwt.secret=${JWT_SECRET:c2VjcmV0S2V5U2hvdWxkQmVMb25nRW5vdWdoRm9yU2VjdXJpdHlQdXJwb3Nlc1NhbXBsZXMxMjM0NTY3ODkw}
jwt.expiration=86400000

# CORS — comma-separated list of allowed origins
# In Azure, set CORS_ORIGINS to your frontend Container App FQDN
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# Logging — comprehensive logging for debugging and monitoring
logging.level.root=INFO
logging.level.a2s=INFO
logging.level.a2s.controller=INFO
logging.level.a2s.service=INFO
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
# File logging
logging.file.name=${LOG_FILE:/app/logs/app.log}
logging.file.max-size=10MB
logging.file.max-history=14
logging.file.total-size-cap=1GB

# HTTP Response Compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# Azure ingress / reverse proxy support
server.forward-headers-strategy=framework

# Validation
spring.mvc.throw-exception-if-no-handler-found=true

# ============================================
# MULTIPART FILE UPLOAD CONFIGURATION
# ============================================
# Prevent 503 errors from massive file uploads
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:100MB}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.location=${MULTIPART_LOCATION:/tmp}
spring.servlet.multipart.resolve-lazily=false

# Tomcat-specific multipart limits
server.tomcat.max-http-post-size=104857600

# ============================================
# TIMEOUT CONFIGURATION
# ============================================
# Connection and request timeouts to prevent hanging requests
server.tomcat.connection-timeout=120000
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
server.servlet.session.timeout=120m

# HTTP client timeouts
server.http2.enabled=true

# ============================================
# REQUEST/RESPONSE LOGGING
# ============================================
# Enable request/response logging for debugging
spring.mvc.log-request-details=${LOG_REQUEST_DETAILS:true}

# ============================================
# ACTUATOR & HEALTH MONITORING
# ============================================
# Enable actuator endpoints for monitoring and diagnostics
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
# Enable detailed logging of health checks
management.endpoint.health.logging.slow-indicator-threshold=5000ms

# OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email

# App OAuth2 Redirect
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:3000/#/dashboard}
